services:
  - type: web
    name: nexlink
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    disk:
      name: nexlink-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
